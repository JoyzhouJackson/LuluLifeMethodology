<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>人生管理系统</title>
    <link rel="icon" href="./public/app-icon.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="./public/app-icon.jpg">
    <link rel="manifest" href="./public/manifest.webmanifest">
    <link rel="stylesheet" href="./public/styles.css">
  </head>
  <body>
    <main class="app-main" style="min-height: 100vh; display: grid; place-items: center;">
      <p>正在打开人生管理系统...</p>
    </main>
    <script>
      fetch("./public/index.html")
        .then((response) => response.text())
        .then((html) => {
          const page = new DOMParser().parseFromString(html, "text/html");
          document.body.innerHTML = page.body.innerHTML;
          const script = document.createElement("script");
          script.src = "./public/app.js";
          document.body.appendChild(script);
        })
        .catch(() => {
          document.body.innerHTML = "<main class=\"app-main\"><p>页面加载失败，请刷新重试。</p></main>";
        });
    </script>
  </body>
</html>
